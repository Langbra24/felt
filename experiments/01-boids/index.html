<!DOCTYPE html>
<html lang="en" style="background:#0a0a0a">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>felt — 01 Boids</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --panel-bg: #111111;
      --border: #1e1e1e;
      --text: #e0e0e0;
      --muted: #555;
      --accent: #c8f0d0;
      --mono: 'JetBrains Mono', 'Fira Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      overflow: hidden;
    }

    canvas {
      display: block;
      position: fixed;
      top: 0; left: 0;
      background: var(--bg);
    }

    #ui {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      align-items: flex-end;
    }

    #back {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-decoration: none;
      padding: 0.4rem 0.75rem;
      border: 1px solid var(--border);
      background: rgba(10,10,10,0.8);
      backdrop-filter: blur(8px);
      transition: color 0.15s, border-color 0.15s;
    }
    #back:hover { color: var(--text); border-color: var(--muted); }

    #label {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      text-align: right;
    }

    /* Tweakpane theme overrides */
    .tp-dfwv {
      width: 260px !important;
    }
  </style>
</head>
<body>

  <div id="ui">
    <a id="back" href="/">← felt</a>
    <span id="label">01 — boids</span>
    <div id="panel"></div>
  </div>

  <script type="module" src="./sketch.js"></script>
</body>
</html>
